# =====================================================================
#  e-most : centrální konfigurace
#  Verzováno v gitu. HESLA/TOKENY sem NEPATŘÍ → secrets.toml (mimo git).
#  Interpolace placeholderů řeší loader:  {base}  {doc_root}  {rok}
#  ({rok} = kalendářní rok z [org.pohoda].rok)
# =====================================================================

# ── Účetní jednotka ──────────────────────────────────────────────────
# Kanonická definice firmy. Ostatní sekce/kód se odkazují SEM.
[org]
nazev           = "Moštárna Hostětín s.r.o."
ico             = "26896869"
gln             = "8594045920000"
email_org_admin = "radim@mostarna.bio"      # kam chodí chybové notifikace úloh

[org.pohoda]
# Pozor: DVA různé roky, na přelomu období se rozcházejí.
db_prefix   = "StwPh_26896869"
rok         = 2026          # KALENDÁŘNÍ rok → cesty, názvy výpisů, placeholder {rok}
rok_ucto_db = 2025          # ÚČETNÍ rok DB  → StwPh_26896869_<rok_ucto_db> (teď 2025)
# Kořen dokumentů Pohody (na tohle navazují cesty banka/doklady):
doc_root    = 'c:\ProgramData\STORMWARE\POHODA SQL\Dokumenty\Mostarna'

# ── DB spojení (jedna instance pro tasks i výrobu) ───────────────────
[mssql]
driver  = "ODBC Driver 17 for SQL Server"
server  = 'NJABKO\SQLEXPRESS'
trusted = true                              # Windows auth; jinak trusted=false + uid/pwd v secrets.toml
db_all  = "StwPh_26896869_all"              # cross-year 'all' vrstva (v_451 ...)
db_most = "most"                            # vlastní DB (core.config / task / task_log)
# db_ucetni se skládá v kódu: db_prefix + "_" + rok_ucto_db  → StwPh_26896869_2025

# ── Odchozí mail (interní relay zodiac, bez auth) ────────────────────
[smtp]
host = "zodiac.hostetin.org"
port = 25
auth = false                                # relay bez přihlášení; heslo netřeba
from = "e-most@mostarna.bio"                # systémový odesílatel

# ── Scheduler (plánovač úloh) ────────────────────────────────────────
[scheduler]
# Task Scheduler spouští `runner.py scheduler` každých beh_minut.
# Scheduler přečte core.task.cron a spustí úlohy, jejichž čas padl
# do okna od minulého běhu (nic se nepromešká, i když běží po 10 min).
beh_minut = 10

# ── Úlohy (tasks) ────────────────────────────────────────────────────
[tasks.zasoby_min]
enabled         = true
view            = "dbo.v_451_skz_obj_min_stav"
mail_to         = ["radim@mostarna.bio"]
subject         = "e-most: zásoby pod minimem"
posilat_prazdne = false                     # true = poslat i když nic pod minimem

[tasks.banka_import]
enabled  = false
# lastStatement z FIO API → uloží transactions.pdf do složky banky.
# Cesta se skládá z doc_root + rok:  <doc_root>\Účetnictví\Banka\{rok}\FIO_CZK
banka_dir = "{doc_root}\\Účetnictví\\Banka\\{rok}\\FIO_CZK"
ucet      = "2500697325"                    # jen pro název souboru fio_<ucet>_<rok>_<id>.pdf
# fio_token → secrets.toml  [tasks.banka_import] fio_token = "..."

[tasks.skeny_kontrola]
enabled = false

[tasks.faktury_po_splatnosti]
enabled = true
mail_to = ["pavla@mostarna.bio"]
subject = "faktury po splatnosti"
# override prijemce parametrem:  runner.py faktury_po_splatnosti "mailto=nekdo@x.cz"

# =====================================================================
#  SCAN (modul pipeline.py) — beze změny, jen přesunuto dolů
# =====================================================================
[storage]
# Základní složka e-most na zodiacu (z pohledu Win11 .132).
# UNC je spolehlivější než písmeno disku (funguje i ze služby/Task Scheduleru).
base = "\\\\zodiac\\most\\e-most"

[scan]
inbox_single = "{base}\\in\\scan\\single"
inbox_split  = "{base}\\in\\scan\\split"

[target]
root = "H:\\Dokumenty\\Mostarna\\Fakturace\\P\u0159ijat\u00e9 objedn\u00e1vky"
series_len = 4
allow_new_series = false

[ocr]
tesseract_cmd = "C:\\Program Files\\Tesseract-OCR\\tesseract.exe"
lang = "ces"
dpi  = 300
crop_left   = 0.45
crop_top    = 0.0
crop_right  = 1.0
crop_bottom = 0.08
doc_number_regex = "\\b(\\d{7})\\b"

[behavior]
stable_seconds = 5
extensions = [".pdf"]
delete_source_after = true

[logging]
level = "INFO"                              # DEBUG | INFO | WARNING | ERROR
file  = "{base}\\_sys\\logs\\scan_pipeline.log"

[paths]
failed = "{base}\\_sys\\failed"

# =====================================================================
#  VÝROBA (modul pohoda_vyroba.py)
# =====================================================================
[vyroba]
# ico se bere z [org].ico (už zde neduplikujeme)
xml_out_dir   = 't:\e-most\out\xml'
stredisko_ids = "VYROBA"                    # sSTR.IDS pro source i destination
zam_refstr    = 1                           # ZAM.RefStr = středisko výroba
produkt_where = "z.ID IN (SELECT DISTINCT RefAg FROM dbo.SKzPol)"
# DB pro čtení číselníků = [mssql].db_prefix + "_" + rok_ucto_db (v kódu)
